<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V4 Quant Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f0f23;color:#e0e0e0}
.topbar{background:#1a1a2e;padding:15px 30px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333}
.topbar h1{color:#00d4ff;font-size:22px}
.mode-switch{display:flex;background:#252540;border-radius:8px;overflow:hidden}
.mode-btn{padding:8px 20px;cursor:pointer;border:none;background:transparent;color:#888;font-size:14px}
.mode-btn.active{background:#00d4ff;color:#0f0f23;font-weight:bold}
.container{max-width:1400px;margin:0 auto;padding:20px}
.panel{background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid #333;margin-bottom:20px}
.panel h2{color:#00d4ff;font-size:16px;margin-bottom:15px}
.controls{display:flex;gap:15px;align-items:center;flex-wrap:wrap}
.control-group{display:flex;flex-direction:column;gap:4px}
.control-group label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px}
select,button{padding:8px 16px;border-radius:6px;border:1px solid #444;background:#252540;color:#e0e0e0;font-size:14px;cursor:pointer}
.btn-run{background:#00d4ff;color:#0f0f23;font-weight:bold;border:none;padding:10px 24px;border-radius:8px}
.btn-run:disabled{background:#555;color:#888;cursor:not-allowed}
.progress-bar{height:4px;background:#252540;border-radius:2px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:#00d4ff;transition:width 0.3s;border-radius:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.kpi-card{background:#252540;border-radius:10px;padding:15px}
.kpi-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px}
.kpi-value{font-size:24px;font-weight:bold;margin:4px 0}
.kpi-sub{font-size:12px;color:#666}
.pos{color:#00e676}.neg{color:#ff5252}.neu{color:#ffc107}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
canvas{max-height:280px}
.trade-scroll{max-height:400px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#252540;color:#00d4ff;padding:10px;text-align:left}
td{padding:8px 10px;border-bottom:1px solid #2a2a4a}
tr:hover{background:#1e1e3a}
.live-card{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2a2a4a}
.hidden{display:none!important}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold}
.badge-win{background:#1b5e20;color:#00e676}
.badge-loss{background:#b71c1c;color:#ff5252}
</style>
</head>
<body>
<div class="topbar">
  <h1>V5 Sector Rotation Dashboard</h1>
  <div class="mode-switch">
    <button class="mode-btn active" onclick="switchMode('backtest')">Backtest</button>
    <button class="mode-btn" onclick="switchMode('live')">Live</button>
  </div>
</div>
<div class="container">
  <div id="backtestPanel">
    <div class="panel">
      <h2>Backtest Parameters</h2>
      <div class="controls">
        <div class="control-group"><label>Period</label>
          <select id="daysSelect">
            <option value="180">6 months</option>
            <option value="365" selected>1 year</option>
            <option value="730">2 years</option>
            <option value="1095">3 years</option>
          </select>
        </div>
        <div class="control-group"><label>Strategy</label>
          <select id="strategySelect">
            <option value="v5" selected>V5 Sector ETF Rotation</option>
            <option value="v4">V4 Pure Momentum</option>
            <option value="v2fast">V2 Fast (3d rebalance)</option>
            <option value="v2slow">V2 Original (10d rebalance)</option>
          </select>
        </div>
        <button class="btn-run" id="runBtn" onclick="runBacktest()">Run Backtest</button>
        <button class="btn-run" id="wfBtn" onclick="runWalkForward()" style="background:#00ff88;color:#0f0f23">Walk-Forward</button>
      </div>
      <div class="progress-bar hidden" id="progressArea"><div class="progress-fill" id="progressFill" style="width:30%"></div></div>
      <div id="statusText" style="color:#888;font-size:13px;margin-top:5px"></div>
    </div>
    <div id="wfArea" class="hidden">
      <div class="panel"><h2>Walk-Forward Validation</h2>
        <div class="progress-bar" id="wfProgressArea" style="display:none"><div class="progress-fill" id="wfProgressFill" style="width:30%;background:#00ff88"></div></div>
        <div id="wfStatusText" style="color:#888;font-size:13px;margin:5px 0"></div>
        <div id="wfResults"></div>
      </div>
    </div>
    <div id="resultsArea" class="hidden">
      <div class="kpi-grid" id="kpiGrid"></div>
      <div class="panel"><h2>Equity Curve</h2><canvas id="equityChart"></canvas></div>
      <div class="chart-row">
        <div class="panel"><h2>Drawdown</h2><canvas id="ddChart"></canvas></div>
        <div class="panel"><h2>Monthly Returns</h2><canvas id="monthlyChart"></canvas></div>
      </div>
      <div class="panel"><h2>Cumulative PnL</h2><canvas id="cumPnlChart"></canvas></div>
      <div class="panel"><h2>Trade Log</h2><div class="trade-scroll"><table>
        <thead><tr><th>#</th><th>Symbol</th><th>Buy Date</th><th>Sell Date</th><th>Entry</th><th>Exit</th><th>Qty</th><th>PnL</th><th>Return</th><th>Hold</th><th>Exit Reason</th></tr></thead>
        <tbody id="tradeTable"></tbody>
      </table></div></div>
    </div>
  </div>
  <div id="livePanel" class="hidden">
    <div class="panel">
      <h2>Live Trading</h2>
      <div class="controls">
        <button class="btn-run" id="liveScanBtn" onclick="runLiveScan()">Manual Scan</button>
      </div>
      <div class="progress-bar hidden" id="liveProgressArea"><div class="progress-fill" id="liveProgressFill" style="width:60%"></div></div>
      <div id="liveStatusText" style="color:#888;font-size:13px;margin-top:5px"></div>
      <div style="margin-top:20px" id="liveInfo"></div>
      <div id="livePositions"></div>
    </div>
    <div class="panel">
      <h2>Strategy Info</h2>
      <div id="strategyInfo">Loading...</div>
    </div>
    <div id="liveScanOutput" class="hidden panel"><h2>Scan Output</h2><pre id="liveScanLog" style="font-size:12px;color:#aaa;white-space:pre-wrap"></pre></div>
  </div>
</div>
<script>
let charts = {};
let pollTimer = null;
function switchMode(m) {
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  if(m==='backtest'){document.querySelectorAll('.mode-btn')[0].classList.add('active');document.getElementById('backtestPanel').classList.remove('hidden');document.getElementById('livePanel').classList.add('hidden')}
  else{document.querySelectorAll('.mode-btn')[1].classList.add('active');document.getElementById('backtestPanel').classList.add('hidden');document.getElementById('livePanel').classList.remove('hidden');refreshLive()}
}
function runBacktest() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true; btn.textContent = 'Running...';
  document.getElementById('progressArea').classList.remove('hidden');
  document.getElementById('progressFill').style.width = '30%';
  document.getElementById('statusText').textContent = 'Starting...';
  fetch('/api/backtest', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({days:+document.getElementById('daysSelect').value,mode:document.getElementById('strategySelect').value})})
  .then(r=>r.json()).then(()=>{pollTask('backtest')})
}
function pollTask(type) {
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async()=>{
    const d = await(await fetch('/api/task/status')).json();
    if(type==='backtest'){
      if(d.status==='running'){document.getElementById('progressFill').style.width='60%';document.getElementById('statusText').textContent=d.progress||'Running...'}
      else if(d.status==='done'){clearInterval(pollTimer);document.getElementById('progressFill').style.width='100%';document.getElementById('statusText').textContent='Done!';document.getElementById('runBtn').disabled=false;document.getElementById('runBtn').textContent='Run Backtest';renderResults(d.result);setTimeout(()=>document.getElementById('progressArea').classList.add('hidden'),1000)}
      else if(d.status==='error'){clearInterval(pollTimer);document.getElementById('statusText').textContent='Error: '+d.progress;document.getElementById('runBtn').disabled=false;document.getElementById('runBtn').textContent='Run Backtest'}
    } else if(type==='live'){
      if(d.status==='running'){document.getElementById('liveProgressFill').style.width='60%';document.getElementById('liveStatusText').textContent=d.progress||'Scanning...'}
      else if(d.status==='done'){clearInterval(pollTimer);document.getElementById('liveProgressFill').style.width='100%';document.getElementById('liveStatusText').textContent='Scan done!';if(d.result&&d.result.output){document.getElementById('liveScanLog').textContent=d.result.output;document.getElementById('liveScanOutput').classList.remove('hidden')}
function runWalkForward() {
  const btn = document.getElementById("wfBtn");
  btn.disabled = true; btn.textContent = "Running...";
  document.getElementById("wfProgressArea").style.display = "block";
  document.getElementById("wfStatusText").textContent = "Starting walk-forward...";
  document.getElementById("wfArea").classList.remove("hidden");
  fetch("/api/walkforward/start", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({train_days:120, test_days:60})})
    .then(r=>r.json()).then(()=>{pollWF()})
}
function pollWF() {
  const timer = setInterval(async()=>{
    const d = await(await fetch("/api/walkforward/status")).json();
    if(d.status==="running") {
      document.getElementById("wfProgressFill").style.width = "60%";
      document.getElementById("wfStatusText").textContent = d.progress || "Running grid search...";
    } else if(d.status==="done") {
      clearInterval(timer);
      document.getElementById("wfProgressFill").style.width = "100%";
      document.getElementById("wfStatusText").textContent = "Complete!";
      document.getElementById("wfBtn").disabled = false;
      document.getElementById("wfBtn").textContent = "Walk-Forward";
      renderWF(d.result);
      setTimeout(()=>{document.getElementById("wfProgressArea").style.display="none"}, 2000);
    } else if(d.status==="error") {
      clearInterval(timer);
      document.getElementById("wfStatusText").textContent = "Error: " + d.progress;
      document.getElementById("wfBtn").disabled = false;
      document.getElementById("wfBtn").textContent = "Walk-Forward";
    }
  }, 2000);
}
function renderWF(r) {
  if(!r) return;
  const windows = r.windows || [];
  const train_avg = windows.reduce((s,w)=>s+w.train_return,0)/windows.length;
  const test_avg = windows.reduce((s,w)=>s+w.test_return,0)/windows.length;
  const pos = windows.filter(w=>w.test_return>0).length;
  const deg = (train_avg - test_avg).toFixed(2);
  let html = '<div class="kpi-grid">';
  html += '<div class="kpi-card"><div class="kpi-label">Windows</div><div class="kpi-value">'+windows.length+'</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">Train Avg</div><div class="kpi-value '+(train_avg>=0?'pos':'neg')+'">'+train_avg.toFixed(2)+'%</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">Test Avg</div><div class="kpi-value '+(test_avg>=0?'pos':'neg')+'">'+test_avg.toFixed(2)+'%</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">Positive</div><div class="kpi-value '+(pos>=windows.length*0.6?'pos':'neu')+'">'+pos+'/'+windows.length+'</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">Degradation</div><div class="kpi-value '+(deg<3?'pos':deg<6?'neu':'neg')+'">'+deg+'%</div></div>';
  html += '</div>';
  html += '<div class="trade-scroll" style="margin-top:15px"><table><thead><tr><th>#</th><th>Train Period</th><th>Test Period</th><th>Train %</th><th>Test %</th><th>Params</th></tr></thead><tbody>';
  windows.forEach((w,i)=>{
    html += '<tr><td>'+(i+1)+'</td><td>'+w.train_start+' to '+w.train_end+'</td><td>'+w.test_start+' to '+w.test_end+'</td>';
    html += '<td class="'+(w.train_return>=0?'pos':'neg')+'">'+w.train_return.toFixed(2)+'%</td>';
    html += '<td class="'+(w.test_return>=0?'pos':'neg')+'">'+w.test_return.toFixed(2)+'%</td>';
    html += '<td>R'+(w.params?.rebalance_interval||'?')+'/S'+(w.params?.stop_loss||'?')+'/P'+(w.params?.max_positions||'?')+'</td></tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById("wfResults").innerHTML = html;
}

refreshLive();setTimeout(()=>document.getElementById('liveProgressArea').classList.add('hidden'),2000)}
      else if(d.status==='error'){clearInterval(pollTimer);document.getElementById('liveStatusText').textContent='Error: '+d.progress}
    }
  },1500);
}
function runLiveScan() {
  fetch('/api/live/scan',{method:'POST'}).then(r=>r.json()).then(()=>{document.getElementById('liveProgressArea').classList.remove('hidden');pollTask('live')})
}
function renderResults(r) {
  document.getElementById('resultsArea').classList.remove('hidden');
  const cfg = STRATEGY_CONFIGS[r.strategy_version]||{};
  const badgeName = cfg.name||r.strategy_version;
  const badgeColor = cfg.color||'#00d4ff';
  const ret=r.returns,risk=r.risk,bench=r.benchmark,tr=r.trades;
  const kpis=[
    {label:'Strategy',value:badgeName,sub:r.period.start+' to '+r.period.end,badgeColor:badgeColor},
    {label:'Alpha',value:bench.alpha_pct.toFixed(2)+'%',sub:'SPY '+bench.spy_return_pct.toFixed(2)+'%',cls:bench.alpha_pct>=0?'pos':'neg'},
    {label:'Sharpe',value:risk.sharpe.toFixed(3),sub:'Sortino '+risk.sortino.toFixed(3),cls:risk.sharpe>0.5?'pos':'neu'},
    {label:'Max Drawdown',value:risk.max_dd_pct.toFixed(2)+'%',sub:risk.max_dd_date,cls:'neg'},
    {label:'Win Rate',value:tr.win_rate_pct.toFixed(1)+'%',sub:tr.wins+'W/'+tr.losses+'L',cls:tr.win_rate_pct>=55?'pos':'neu'},
    {label:'Profit Factor',value:tr.pf.toFixed(2),sub:'Exp $'+Math.round(tr.expectancy)+'/trade',cls:tr.pf>=2?'pos':tr.pf>=1?'neu':'neg'},
    {label:'Final Equity',value:'$'+ret.final.toLocaleString(),sub:'Start $'+ret.initial.toLocaleString()},
    {label:'Trades',value:tr.total,sub:'Avg hold '+tr.avg_hold.toFixed(0)+'d'},
  ];
  document.getElementById('kpiGrid').innerHTML=kpis.map(k=>'<div class="kpi-card"'+(k.badgeColor?' style="border-left:3px solid '+k.badgeColor+'"':'')+'><div class="kpi-label">'+k.label+'</div><div class="kpi-value '+(k.cls||'')+'"'+(k.badgeColor?' style="color:'+k.badgeColor+'"':'')+'>'+k.value+'</div><div class="kpi-sub">'+k.sub+'</div></div>').join('');
  Object.values(charts).forEach(c=>c.destroy());charts={};
  const eq=r.equity_curve;
  charts.eq=new Chart(document.getElementById('equityChart'),{type:'line',data:{labels:eq.labels,datasets:[{data:eq.values,borderColor:'#00d4ff',backgroundColor:'rgba(0,212,255,0.1)',fill:true,tension:0.3,pointRadius:0}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{display:false},y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',color:'#888'},grid:{color:'#2a2a4a'}}}}});
  charts.dd=new Chart(document.getElementById('ddChart'),{type:'line',data:{labels:eq.labels,datasets:[{data:r.dd_series,borderColor:'#ff5252',backgroundColor:'rgba(255,82,82,0.15)',fill:true,tension:0.3,pointRadius:0}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{display:false},y:{ticks:{callback:v=>v.toFixed(1)+'%',color:'#888'},grid:{color:'#2a2a4a'}}}}});
  const mColors=r.monthly.returns.map(v=>v>=0?'#00e676':'#ff5252');
  charts.m=new Chart(document.getElementById('monthlyChart'),{type:'bar',data:{labels:r.monthly.labels,datasets:[{data:r.monthly.returns,backgroundColor:mColors}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888'}},y:{ticks:{callback:v=>v+'%',color:'#888'},grid:{color:'#2a2a4a'}}}}});
  if(r.cum_pnl&&r.cum_pnl.length){charts.cum=new Chart(document.getElementById('cumPnlChart'),{type:'line',data:{labels:r.cum_pnl.map((_,i)=>i+1),datasets:[{data:r.cum_pnl,borderColor:'#ffc107',backgroundColor:'rgba(255,193,7,0.1)',fill:true,tension:0.3,pointRadius:0}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{display:false},y:{ticks:{callback:v=>'$'+Math.round(v),color:'#888'},grid:{color:'#2a2a4a'}}}}})}
  document.getElementById('tradeTable').innerHTML=(r.all_trades||[]).map((t,i)=>'<tr><td>'+(i+1)+'</td><td><b>'+t.symbol+'</b></td><td>'+t.entry_date+'</td><td>'+t.exit_date+'</td><td>$'+t.entry_price+'</td><td>$'+t.exit_price+'</td><td>'+t.qty+'</td><td class="'+(t.pnl>=0?'pos':'neg')+'">$'+t.pnl+'</td><td class="'+(t.pnl_pct>=0?'pos':'neg')+'">'+t.pnl_pct.toFixed(2)+'%</td><td>'+t.holding_days+'d</td><td><span class="badge '+(t.pnl>=0?'badge-win':'badge-loss')+'">'+t.exit_reason+'</span></td></tr>').join('');
}
const STRATEGY_CONFIGS={v4:{name:'V4 Pure Momentum',color:'#00ff88',params:[['Factor','60d Momentum (100%)'],['Positions','Top 4'],['Rebalance','5 days'],['Stop','10% trailing']]},v2fast:{name:'V2 Fast',color:'#ff9800',params:[['Rebalance','3 days'],['Stop','1.8xATR']]},v2slow:{name:'V2 Original',color:'#00d4ff',params:[['Rebalance','10 days'],['Stop','2.5xATR']]}};
async function refreshLive(){
  try{
    const s=await(await fetch('/api/live/status')).json();
    const i=await(await fetch('/api/strategy/info')).json();
    document.getElementById('liveInfo').innerHTML='<div class="live-card"><span>Equity</span><span>$'+(s.equity||0).toLocaleString()+'</span></div><div class="live-card"><span>Cash</span><span>$'+(s.cash||0).toLocaleString()+'</span></div>';
    const regime=i.regime||{};
    document.getElementById('strategyInfo').innerHTML='<div class="live-card"><span>Version</span><span style="color:#00ff88;font-weight:bold">'+(i.version||'?')+'</span></div><div class="live-card"><span>Regime</span><span style="color:#ff9800;font-weight:bold">'+(regime.regime||'?')+'</span></div><div class="live-card"><span>Risk Mult</span><span>'+(regime.risk_multiplier||0)+'</span></div><h3 style="margin-top:15px;color:#888">Top Rankings</h3>'+(i.rankings||[]).map(r=>'<div class="live-card"><span>'+r.symbol+' ($'+r.price+')</span><span class="pos">'+(r.momentum*100).toFixed(1)+'%</span></div>').join('');
    const pos=s.positions||[];
    if(pos.length){document.getElementById('livePositions').innerHTML='<h3 style="margin-top:15px;color:#888">Open Positions</h3>'+pos.map(p=>'<div class="live-card"><span>'+p.symbol+' x'+p.qty+'</span><span class="'+(p.unrealized_pl>=0?'pos':'neg')+'">'+p.unrealized_plpc.toFixed(2)+'%</span></div>').join('')}
  }catch(e){document.getElementById('strategyInfo').textContent='Error: '+e.message}
}

function runWalkForward() {
  const btn = document.getElementById("wfBtn");
  btn.disabled = true; btn.textContent = "Running...";
  document.getElementById("wfProgressArea").style.display = "block";
  document.getElementById("wfStatusText").textContent = "Starting walk-forward...";
  document.getElementById("wfArea").classList.remove("hidden");
  fetch("/api/walkforward/start", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({train_days:120, test_days:60})})
    .then(r=>r.json()).then(()=>{pollWF()})
}
function pollWF() {
  const timer = setInterval(async()=>{
    const d = await(await fetch("/api/walkforward/status")).json();
    if(d.status==="running") {
      document.getElementById("wfProgressFill").style.width = "60%";
      document.getElementById("wfStatusText").textContent = d.progress || "Running grid search...";
    } else if(d.status==="done") {
      clearInterval(timer);
      document.getElementById("wfProgressFill").style.width = "100%";
      document.getElementById("wfStatusText").textContent = "Complete!";
      document.getElementById("wfBtn").disabled = false;
      document.getElementById("wfBtn").textContent = "Walk-Forward";
      renderWF(d.result);
      setTimeout(()=>{document.getElementById("wfProgressArea").style.display="none"}, 2000);
    } else if(d.status==="error") {
      clearInterval(timer);
      document.getElementById("wfStatusText").textContent = "Error: " + d.progress;
      document.getElementById("wfBtn").disabled = false;
      document.getElementById("wfBtn").textContent = "Walk-Forward";
    }
  }, 2000);
}
function renderWF(r) {
  if(!r) return;
  const windows = r.windows || [];
  const train_avg = windows.reduce((s,w)=>s+w.train_return,0)/windows.length;
  const test_avg = windows.reduce((s,w)=>s+w.test_return,0)/windows.length;
  const pos = windows.filter(w=>w.test_return>0).length;
  const deg = (train_avg - test_avg).toFixed(2);
  let html = '<div class="kpi-grid">';
  html += '<div class="kpi-card"><div class="kpi-label">Windows</div><div class="kpi-value">'+windows.length+'</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">Train Avg</div><div class="kpi-value '+(train_avg>=0?'pos':'neg')+'">'+train_avg.toFixed(2)+'%</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">Test Avg</div><div class="kpi-value '+(test_avg>=0?'pos':'neg')+'">'+test_avg.toFixed(2)+'%</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">Positive</div><div class="kpi-value '+(pos>=windows.length*0.6?'pos':'neu')+'">'+pos+'/'+windows.length+'</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">Degradation</div><div class="kpi-value '+(deg<3?'pos':deg<6?'neu':'neg')+'">'+deg+'%</div></div>';
  html += '</div>';
  html += '<div class="trade-scroll" style="margin-top:15px"><table><thead><tr><th>#</th><th>Train Period</th><th>Test Period</th><th>Train %</th><th>Test %</th><th>Params</th></tr></thead><tbody>';
  windows.forEach((w,i)=>{
    html += '<tr><td>'+(i+1)+'</td><td>'+w.train_start+' to '+w.train_end+'</td><td>'+w.test_start+' to '+w.test_end+'</td>';
    html += '<td class="'+(w.train_return>=0?'pos':'neg')+'">'+w.train_return.toFixed(2)+'%</td>';
    html += '<td class="'+(w.test_return>=0?'pos':'neg')+'">'+w.test_return.toFixed(2)+'%</td>';
    html += '<td>R'+(w.params?.rebalance_interval||'?')+'/S'+(w.params?.stop_loss||'?')+'/P'+(w.params?.max_positions||'?')+'</td></tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById("wfResults").innerHTML = html;
}

refreshLive();
</script>
</body></html>
